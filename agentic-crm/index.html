<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentCRM — AI-Powered CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <div class="s-logo">AC</div>
    <nav class="s-nav">
      <!-- Dashboard (active by default) -->
      <div class="ni on" data-view="dashboard" title="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <!-- Pipeline -->
      <div class="ni" data-view="pipeline" title="Pipeline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </div>
      <!-- Account Intel -->
      <div class="ni" data-view="account" title="Account Intel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <!-- Inbox -->
      <div class="ni" data-view="inbox" title="Agent Inbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
          <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
        </svg>
      </div>
      <!-- Tickets -->
      <div class="ni" data-view="tickets" title="Tickets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
          <path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
          <path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/>
          <path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/>
        </svg>
      </div>
      <!-- Agent Chat -->
      <div class="ni" data-view="chat" title="Agent Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <!-- Alerts -->
      <div class="ni" title="Alerts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
    </nav>
    <div id="sidebar-agents"></div>
    <div class="s-bot">
      <!-- Decorative gradient blob -->
      <div class="s-blob">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="sb1" cx="35%" cy="30%" r="70%">
              <stop offset="0%" stop-color="#FFC8DD"/>
              <stop offset="35%" stop-color="#F43F5E"/>
              <stop offset="75%" stop-color="#7A1E62"/>
              <stop offset="100%" stop-color="#2B0F2F"/>
            </radialGradient>
            <radialGradient id="sb2" cx="70%" cy="65%" r="50%">
              <stop offset="0%" stop-color="#FFA85C" stop-opacity="0.7"/>
              <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="42" fill="url(#sb1)"/>
          <circle cx="50" cy="50" r="42" fill="url(#sb2)"/>
          <ellipse cx="38" cy="36" rx="14" ry="9" fill="rgba(255,255,255,0.35)"/>
        </svg>
      </div>
      <!-- Settings -->
      <div class="ni" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <!-- User avatar -->
      <div class="s-av">CS</div>
    </div>
  </aside>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <div class="main">

    <!-- TOP NAV (shared across all views) -->
    <header class="topnav">
      <h1 class="topnav-title" id="page-title">AgentCRM</h1>
      <div class="platform-pill">
        <span class="pdot"></span>
        <span id="agent-count">14 agents active</span> · Q2 2026
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <!-- Persona Toggle -->
      <div class="persona-toggle">
        <button class="persona-btn on" data-persona="saas">SaaS</button>
        <button class="persona-btn" data-persona="telecom">Telecom</button>
      </div>
      <div class="search-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search accounts, agents…
      </div>
      <div class="spacer"></div>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/></svg>
      </div>
      <div class="icon-btn notif">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <button class="btn-primary" id="primary-action">Deploy agent</button>
    </header>

    <!-- ═══════════ VIEWS ═══════════ -->

    <!-- VIEW: DASHBOARD -->
    <div class="view view-dashboard active" id="view-dashboard"></div>

    <!-- VIEW: PIPELINE -->
    <div class="view view-pipeline" id="view-pipeline"></div>

    <!-- VIEW: ACCOUNT INTEL -->
    <div class="view view-account" id="view-account"></div>

    <!-- VIEW: INBOX -->
    <div class="view view-inbox" id="view-inbox"></div>

    <!-- VIEW: TICKETS -->
    <div class="view view-tickets" id="view-tickets"></div>

    <!-- VIEW: AGENT CHAT -->
    <div class="view view-chat" id="view-chat"></div>

  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
