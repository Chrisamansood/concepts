<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Concepts — Chris Sood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0E17;
      --surface: #111827;
      --surface-2: #1A2236;
      --border: rgba(255,255,255,0.06);
      --t1: #F1F5F9;
      --t2: #94A3B8;
      --t3: #64748B;
      --accent: #F97316;
      --accent-dim: rgba(249,115,22,0.12);
      --green: #22C55E;
      --r: 12px;
      --r-sm: 8px;
      --font: 'Source Sans 3', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px 20px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .header-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .header-label {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--t3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    h1 .accent { color: var(--accent); }

    .header-sub {
      font-size: 17px;
      color: var(--t2);
      max-width: 620px;
      line-height: 1.65;
    }

    .header-meta {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      font-size: 13px;
      color: var(--t3);
      font-family: var(--mono);
    }

    .header-meta a {
      color: var(--t3);
      text-decoration: none;
      transition: color 0.2s;
    }

    .header-meta a:hover { color: var(--accent); }

    /* ── Grid ── */
    .grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    /* ── Concept Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.25s, transform 0.25s;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .card-glow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover .card-glow { opacity: 1; }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.18);
      border-radius: 20px;
      padding: 3px 12px;
    }

    .card-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .card-subtitle {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--t3);
    }

    .card-desc {
      font-size: 14px;
      color: var(--t2);
      line-height: 1.6;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface-2);
      color: var(--t3);
      border: 1px solid var(--border);
    }

    .card-cta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-top: auto;
    }

    .card-cta svg {
      width: 14px;
      height: 14px;
      transition: transform 0.2s;
    }

    .card:hover .card-cta svg { transform: translateX(3px); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--t3);
      font-family: var(--mono);
      font-size: 14px;
    }

    /* ── Footer ── */
    .footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 40px;
      font-size: 12px;
      color: var(--t3);
      font-family: var(--mono);
      text-align: center;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeIn 0.4s ease-out both;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .header { padding: 40px 16px 16px; }
      .grid { padding: 16px 16px 60px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-top">
      <div class="header-dot"></div>
      <span class="header-label">Concept Lab</span>
    </div>
    <h1>Product <span class="accent">Concepts</span></h1>
    <p class="header-sub">Interactive prototypes exploring how agentic AI reshapes enterprise software — built to think through ideas, not just present them.</p>
    <div class="header-meta">
      <span>Chris Sood</span>
      <a href="https://github.com/Chrisamansood" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.linkedin.com/in/chrissood/" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </header>

  <main class="grid" id="grid">
    <div class="empty">Loading concepts...</div>
  </main>

  <footer class="footer">
    Built by Chris Sood · Powered by ideas and <a href="https://claude.ai" target="_blank" rel="noopener">Claude</a>
  </footer>

  <script>
    (function() {
      var grid = document.getElementById('grid');

      fetch('concepts.json')
        .then(function(r) { return r.json(); })
        .then(function(concepts) {
          if (!concepts.length) {
            grid.innerHTML = '<div class="empty">No concepts yet — check back soon.</div>';
            return;
          }
          grid.innerHTML = concepts.map(function(c, i) {
            var initials = c.title.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 2);
            return '<a class="card" href="' + c.path + '" style="animation-delay:' + (i * 0.08) + 's">' +
              '<div class="card-glow"></div>' +
              '<div class="card-head">' +
                '<div class="card-icon" style="background:' + (c.color || '#F97316') + '">' + initials + '</div>' +
                '<div class="card-status"><div class="card-status-dot"></div>' + (c.status || 'Live') + '</div>' +
              '</div>' +
              '<div class="card-title">' + c.title + '</div>' +
              '<div class="card-subtitle">' + (c.subtitle || '') + '</div>' +
              '<div class="card-desc">' + c.description + '</div>' +
              '<div class="card-tags">' +
                (c.tags || []).map(function(t) { return '<span class="card-tag">' + t + '</span>'; }).join('') +
              '</div>' +
              '<div class="card-cta">' +
                'Explore concept' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' +
              '</div>' +
            '</a>';
          }).join('');
        })
        .catch(function() {
          grid.innerHTML = '<div class="empty">Could not load concepts.</div>';
        });
    })();
  </script>
</body>
</html>
